<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Android Mirror</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #111;
        color: #eee;
        font-family: monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding: 1rem;
      }
      #statusBar {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
        width: 100%;
        max-width: 600px;
      }
      #dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #888;
        flex-shrink: 0;
      }
      #dot.connected {
        background: #4caf50;
      }
      #dot.streaming {
        background: #8bc34a;
      }
      #dot.error {
        background: #f44336;
      }
      #statusText {
        font-size: 13px;
        color: #aaa;
      }
      #stats {
        font-size: 12px;
        color: #666;
        margin-left: auto;
      }
      #canvasWrap {
        background: #000;
        border-radius: 8px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        max-width: 300px;
        min-height: 500px;
      }
      canvas {
        max-width: 100%;
        display: block;
      }
      #log {
        margin-top: 10px;
        font-size: 11px;
        color: #555;
        max-height: 80px;
        overflow-y: auto;
        width: 100%;
        max-width: 600px;
      }
      #log div {
        padding: 1px 0;
      }
    </style>
  </head>
  <body>
    <div id="statusBar">
      <div id="dot"></div>
      <span id="statusText">Connecting to ws://localhost:8081...</span>
      <span id="stats"></span>
    </div>
    <div id="canvasWrap">
      <canvas id="screen"></canvas>
    </div>
    <div id="log"></div>

    <script>
      const canvas = document.getElementById("screen");
      const ctx = canvas.getContext("2d");
      const dot = document.getElementById("dot");
      const statusText = document.getElementById("statusText");
      const statsEl = document.getElementById("stats");
      const logEl = document.getElementById("log");
      let waitingForKeyframe = true;

      let frameCount = 0,
        lastFrameTime = Date.now();
      let decoder;
      let configured = false;
      let sps = null,
        pps = null;
      let naluBuffer = new Uint8Array(0);
      let pendingChunks = [];

      function log(msg) {
        const d = document.createElement("div");
        d.textContent = new Date().toLocaleTimeString() + " " + msg;
        logEl.prepend(d);
        if (logEl.children.length > 20) logEl.lastChild.remove();
      }

      function setStatus(state, msg) {
        dot.className = state;
        statusText.textContent = msg;
      }

      function concatU8(a, b) {
        const r = new Uint8Array(a.length + b.length);
        r.set(a);
        r.set(b, a.length);
        return r;
      }

      function findStarts(data) {
        const out = [];
        for (let i = 0; i < data.length - 2; i++) {
          if (data[i] === 0 && data[i + 1] === 0) {
            if (data[i + 2] === 1) {
              // 3-byte start code: 00 00 01
              out.push({ pos: i, len: 3 });
              i += 2;
            } else if (
              data[i + 2] === 0 &&
              i + 3 < data.length &&
              data[i + 3] === 1
            ) {
              // 4-byte start code: 00 00 00 01
              out.push({ pos: i, len: 4 });
              i += 3;
            }
          }
        }
        return out;
      }

      function buildCodecString(spsNalu) {
        const off = getStartCodeLen(spsNalu) + 1; // skip start code + NAL header byte
        if (spsNalu.length < off + 3) return "avc1.42E01E";
        const profile = spsNalu[off].toString(16).padStart(2, "0");
        const constraints = spsNalu[off + 1].toString(16).padStart(2, "0");
        const level = spsNalu[off + 2].toString(16).padStart(2, "0");
        return `avc1.${profile}${constraints}${level}`;
      }

      function buildAVCC(spsNalu, ppsNalu) {
        const spsOff = getStartCodeLen(spsNalu);
        const ppsOff = getStartCodeLen(ppsNalu);
        const sps = spsNalu.slice(spsOff);
        const pps = ppsNalu.slice(ppsOff);
        const buf = new Uint8Array(11 + sps.length + pps.length);
        let i = 0;
        buf[i++] = 1;
        buf[i++] = sps[1];
        buf[i++] = sps[2];
        buf[i++] = sps[3];
        buf[i++] = 0xff;
        buf[i++] = 0xe1;
        buf[i++] = (sps.length >> 8) & 0xff;
        buf[i++] = sps.length & 0xff;
        for (let j = 0; j < sps.length; j++) buf[i++] = sps[j];
        buf[i++] = 1;
        buf[i++] = (pps.length >> 8) & 0xff;
        buf[i++] = pps.length & 0xff;
        for (let j = 0; j < pps.length; j++) buf[i++] = pps[j];
        return buf;
      }

      function initDecoder(codecStr, description) {
        waitingForKeyframe = true;
        if (decoder) {
          try {
            decoder.close();
          } catch (_) {}
        }

        decoder = new VideoDecoder({
          output: (frame) => {
            canvas.width = frame.displayWidth;
            canvas.height = frame.displayHeight;
            ctx.drawImage(frame, 0, 0);
            frame.close();
            frameCount++;
            const now = Date.now();
            if (now - lastFrameTime >= 1000) {
              const fps = Math.round(
                (frameCount * 1000) / (now - lastFrameTime),
              );
              frameCount = 0;
              lastFrameTime = now;
              statsEl.textContent = fps + " fps";
            }
            if (!configured) {
              configured = true;
              setStatus("streaming", "Streaming");
              log("First frame decoded!");
            }
          },
          error: (e) => {
            log("Decoder error: " + e.message);
            setStatus("error", "Decoder error: " + e.message);
            waitingForKeyframe = true;
          },
        });

        decoder.configure({
          codec: codecStr,
          optimizeForLatency: true,
        });

        log("Decoder configured: " + codecStr);
      }

      function submitChunk({ nalu, naluType }) {
        if (!decoder || decoder.state !== "configured") return;

        const isKey = naluType === 5;

        if (waitingForKeyframe) {
          if (!isKey) return;
          waitingForKeyframe = false;
          log("Got first keyframe, starting decode!");
        }

        try {
          let data = nalu;
          if (isKey && sps && pps) {
            data = concatU8(concatU8(sps, pps), nalu);
          }

          decoder.decode(
            new EncodedVideoChunk({
              type: isKey ? "key" : "delta",
              timestamp: performance.now() * 1000,
              data: data,
            }),
          );
        } catch (e) {
          log("Decode submit: " + e.message);
          if (
            e.message.includes("key frame") ||
            e.message.includes("decode error") ||
            e.message.includes("Decoder failure")
          ) {
            waitingForKeyframe = true;
          }
        }
      }

      function processNalus(data) {
        const starts = findStarts(data);

        for (let i = 0; i < starts.length; i++) {
          const { pos, len } = starts[i];
          const end = i + 1 < starts.length ? starts[i + 1].pos : data.length;
          const nalu = data.slice(pos, end); // includes start code
          const naluByte = nalu[len] & 0x1f; // NAL type byte after start code

          if (nalu.length < len + 1) continue;
          const naluType = naluByte;

          log(`NAL type=${naluType} size=${nalu.length}`); // temporary debug

          if (naluType === 7 && nalu.length < 1000) {
            sps = nalu;
            log("SPS (" + nalu.length + "B)");
            continue;
          }
          if (naluType === 8 && nalu.length < 1000) {
            pps = nalu;
            log("PPS (" + nalu.length + "B)");
            if (sps) {
              initDecoder(buildCodecString(sps), buildAVCC(sps, pps));
              setStatus("connected", "Decoder ready...");
              for (const c of pendingChunks) submitChunk(c);
              pendingChunks = [];
            }
            continue;
          }
          if (naluType === 1 || naluType === 5) {
            if (!decoder || decoder.state !== "configured") {
              pendingChunks.push({ nalu, naluType });
            } else {
              submitChunk({ nalu, naluType });
            }
          }
        }
      }

      function getStartCodeLen(nalu) {
        if (nalu[2] === 1) return 3;
        if (nalu[3] === 1) return 4;
        return 4;
      }

      if (!("VideoDecoder" in window)) {
        setStatus("error", "WebCodecs not supported — use Chrome or Edge 94+");
      } else {
        const ws = new WebSocket("ws://localhost:8081");
        ws.binaryType = "arraybuffer";
        ws.onopen = () => {
          setStatus("connected", "Connected — waiting for stream...");
          log("WS connected");
        };
        ws.onmessage = (e) => {
          const incoming = new Uint8Array(e.data);

          if (naluBuffer.length === 0 && incoming.length > 0) {
            log(
              `First data chunk: ${incoming.length} bytes, starts: ${incoming[0].toString(16)} ${incoming[1].toString(16)} ${incoming[2].toString(16)} ${incoming[3].toString(16)}`,
            );
          }

          naluBuffer = concatU8(naluBuffer, incoming);
          const starts = findStarts(naluBuffer);
          if (starts.length < 2) return;

          
          const completeEnd = starts[starts.length - 1].pos;
          processNalus(naluBuffer.slice(0, completeEnd));
          naluBuffer = naluBuffer.slice(completeEnd);
        };
        ws.onerror = () => setStatus("error", "WebSocket error");
        ws.onclose = () => setStatus("error", "Disconnected");
      }

      if (sps) {
        initDecoder(buildCodecString(sps));
        setStatus("connected", "Decoder ready...");
        for (const c of pendingChunks) submitChunk(c);
        pendingChunks = [];
      }
    </script>
  </body>
</html>
